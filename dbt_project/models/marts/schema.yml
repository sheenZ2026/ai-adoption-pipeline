version: 2

models:

  # ─────────────────────────
  # DimCompany
  # ─────────────────────────
  - name: dim_company
    description: "Unique companies with their attributes"
    columns:

      - name: company_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null

      - name: company_id
        description: "Natural key from source"
        tests:
          - unique
          - not_null

      - name: company_size
        description: "Company size classification"
        tests:
          - accepted_values:
              arguments:
                values: ['Startup', 'SME', 'Enterprise', 'Large Enterprise']


  # ─────────────────────────
  # DimDate
  # ─────────────────────────
  - name: dim_date
    description: "Survey time periods"
    columns:

      - name: date_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null

      - name: year_quarter
        description: "Year and quarter combination"
        tests:
          - unique
          - not_null

      - name: quarter
        tests:
          - accepted_values:
              arguments:
                values: ['Q1', 'Q2', 'Q3', 'Q4']


  # ─────────────────────────
  # DimAITool
  # ─────────────────────────
  - name: dim_ai_tool
    description: "Unique AI tools used by companies"
    columns:

      - name: ai_tool_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null

      - name: ai_primary_tool
        description: "Name of the AI tool"
        tests:
          - unique
          - not_null


  # ─────────────────────────
  # DimAIUseCase
  # ─────────────────────────
  - name: dim_ai_usecase
    description: "Unique AI use cases"
    columns:

      - name: usecase_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null

      - name: ai_use_case
        description: "AI use case name"
        tests:
          - unique
          - not_null


  # ─────────────────────────
  # DimAIAdoptionStage
  # ─────────────────────────
  - name: dim_ai_adoption_stage
    description: "AI maturity stages"
    columns:

      - name: stage_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null

      - name: adoption_stage
        description: "Adoption stage label"
        tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ['Exploring', 'Piloting', 'Scaling', 'Optimizing', 'Transforming']


  # ─────────────────────────
  # DimSurveySource
  # ─────────────────────────
  - name: dim_survey_source
    description: "Survey sources and collection methods"
    columns:

      - name: source_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null


  # ─────────────────────────
  # FactAISurvey
  # ─────────────────────────
  - name: fact_ai_survey
    description: "Core fact table containing AI adoption metrics"
    columns:

      - name: survey_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null

      - name: response_id
        description: "Natural key from source"
        tests:
          - unique
          - not_null


      # ───────── Foreign Keys ─────────

      - name: company_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_company')
                field: company_key

      - name: date_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: ai_tool_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_ai_tool')
                field: ai_tool_key

      - name: usecase_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_ai_usecase')
                field: usecase_key

      - name: stage_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_ai_adoption_stage')
                field: stage_key

      - name: source_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_survey_source')
                field: source_key